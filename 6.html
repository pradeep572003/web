<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>JSSSTU - Simple Layout</title>
    <style>

        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }

        .nav-bar {
            background-color: #060c8c; 
            width: 100%;
            padding: 10px 20px;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            font-weight: bold;
            text-transform: uppercase;
            padding: 0 15px;
            font-size: 14px;
        }

        .nav-links a:hover {
            text-decoration: underline;
        }

        .hero-section {
            background: url("logo.jpeg") center/cover no-repeat;
            height: 400px;
            padding: 50px 30px;
            box-sizing: border-box;
        }

        .hero-section h1 {
            color: #f2f2f2;
            font-size: 30px;
            margin-left: 100px;
            font-style: italic;
            text-transform: uppercase;
            font-weight: bold;
        }

        .hero-section p {
            color: white;
            font-weight: bold;
            width: 50%;
            line-height: 1.6;
            margin-left: 100px;
        }

        .hero-section button {
            margin-left: 100px;
            width: 180px;
            background-color: #e6681a;
            color: white;
            border: none;
            padding: 12px;
            font-weight: bold;
            cursor: pointer;
        }

        .content-section {
            background-color: #e47f02; 
            text-align: center;
            padding: 30px 20px;
            font-weight: bold;
        }

        .content-section h2 {
            text-transform: uppercase;
            margin-bottom: 25px;
            font-size: 24px;
        }

        .section-title {
            color: blue;
            text-decoration: none;
            text-transform: uppercase;
            display: inline-block;
            margin-top: 15px;
            margin-bottom: 10px;
        }

        .notification-text {
            margin: 8px 0;
            font-size: 14px;
            text-transform: uppercase;
        }

        .contact-info {
            color: aliceblue;
            margin-top: 30px;
        }
        
        .contact-info p {
            margin: 4px 0;
            font-size: 14px;
        }

        footer {
            background-color: #002851;
            color: white;
            text-align: center;
            padding: 15px;
            text-transform: uppercase;
            font-size: 14px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <table class="nav-bar" cellspacing="0" cellpadding="0">
        <tr>
            <td>
                <img src="jss.png" alt="Logo" height="50">
            </td>
            <td align="right" class="nav-links">
                <a href="#">About</a>
                <a href="#">Academic</a>
                <a href="#">Research</a>
                <a href="#">Programmes</a>
                <a href="#">Placement</a>
                <a href="#">Contact</a>
            </td>
        </tr>
    </table>

    <div class="hero-section">
        <h1>Welcome To Our Campus</h1>
        <p>JSS STU University </p>
        <button>READ MORE</button>
    </div>

    <div class="content-section">
        <h2>Quick Links</h2>

        <a href="#" class="section-title"><h3>Academic Notification</h3></a>
        <p class="notification-text">Circular: </p>

        <a href="#" class="section-title"><h3>EXAM Notification</h3></a>
        <p class="notification-text">PG - Registration </p>

        <div class="contact-info">
            <h3>JSS Science and Technology University</h3>
            <p>0821-123456</p>
            <p>0821-678987</p>
            <p>contact@jssstuniv.in</p>
        </div>
    </div>

    <footer>
        &copy; Copyright JSS STU 2024.
    </footer>

</body>
</html>
