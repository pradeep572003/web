//index.html

<!DOCTYPE html>
<html>
<head>
    <title>Four Frame Layout</title>
</head>

<frameset rows="50%,50%">
    
    <!-- Top Row -->
    <frameset cols="50%,50%">
        <frame src="3top-left.html">
        <frame src="3top-right.html">
    </frameset>

    <!-- Bottom Row -->
    <frameset cols="50%,50%">
        <frame src="3bottom-left.html">
        <frame src="3bottom-right.html">
    </frameset>

    <noframes>
        <body>
            Your browser does not support frames.
        </body>
    </noframes>

</frameset>
</html>
