<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Calculator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #b1e3ff; 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;

        }

        .heading {
            text-transform: uppercase;
            text-align: center;
            font-weight: bold;
            font-style: italic;
            font-size: 2rem;
            margin-bottom: 15px;
            letter-spacing: 1px;
        }

        .container {
            width: 300px;
            background-color: darkgrey;
            border: 2px solid black;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.15);
        }

        input {
            width: 100%;
            height: 75px;
            font-size: 30px;
            text-align: right;
            box-sizing: border-box;
            border: 1px solid black;
            padding: 0 10px;
            background-color: white;
        }

        .buttons {
            display: flex;
            flex-wrap: wrap;
        }

        button {
            width: 75px;
            height: 75px;
            border: 1px solid black;
            background-color: #eee;
            font-size: 30px;
            cursor: pointer;
            box-sizing: border-box;
        }

        button:active {
            background-color: #ddd;
        }
    </style>
</head>
<body>

    <h1 class="heading">Calculator</h1>

    <div class="container">
        <input type="text" id="display" placeholder="0" readonly>
        
        <div class="buttons">
            <button>AC</button>
            <button>CE</button>
            <button>%</button>
            <button>/</button>
            
            <button>7</button>
            <button>8</button>
            <button>9</button>
            <button>*</button>
            
            <button>4</button>
            <button>5</button>
            <button>6</button>
            <button>-</button>
            
            <button>1</button>
            <button>2</button>
            <button>3</button>
            <button>+</button>
            
            <button>0</button>
            <button>.</button>
            <button>00</button>
            <button>=</button>
        </div>
    </div>

    <script>
        const buttons = document.querySelectorAll('button');
        const display = document.getElementById('display');

        buttons.forEach(button => {
            button.addEventListener('click', (e) => {
                let buttonText = e.target.innerHTML;

                if (buttonText === 'AC') {
                    display.value = '';
                } 
                else if (buttonText === '=') {
                    try {
                        display.value = eval(display.value);
                    } catch (error) {
                        display.value = "Error";
                    }
                } 
                else if (buttonText === 'CE') {
                    display.value = display.value.slice(0, -1);
                } 
                else {
                    display.value += buttonText;
                }
            });
        });
    </script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Form Validation</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f0f2f5;
            text-align: center;
            margin: 0;
        }

        h2 {
            text-transform: uppercase;
            text-decoration: none;
            font-weight: bold;
            margin-top: 20px;
        }

        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 80vh;
        }

        form {
            background-color: #ffffff;
            border-radius: 15px;
            box-shadow: 4px 8px rgba(0, 0, 0, 0.1);
            padding: 30px 40px;
            width: 100%;
            max-width: 400px;
            box-sizing: border-box;
        }

        input, select {
            display: block;
            width: 100%;
            margin-bottom: 20px;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 1rem;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #007bff;
            box-shadow: 0 0 5px rgba(0, 123, 255, 0.5);
        }

        button {
            width: 100%;
            padding: 10px;
            font-size: 1.2rem;
            background-color: #007bff;
            color: #ffffff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

    <h2>Form Validation</h2>

    <div class="container">
        <form>
            <input type="text" id="name" placeholder="Name">
            <input type="email" id="email" placeholder="Email">
            <input type="tel" id="mobile" placeholder="Mobile No">
            
            <select id="gender">
                <option value="">Select Gender</option>
                <option value="male">Male</option>
                <option value="female">Female</option>
            </select>
            
            <input type="text" id="color" placeholder="Favorite Color">
            <button type="button" onclick="validateForm()">Submit</button>
        </form>
    </div>

    <script>
        function validateForm() {
            // Fetch values from elements
            var name = document.getElementById("name").value;
            var email = document.getElementById("email").value;
            var mobile = document.getElementById("mobile").value;
            var gender = document.getElementById("gender").value;
            var color = document.getElementById("color").value;

            if (name === "") {
                alert("Please enter your name");
                return;
            }

            if (email === "") {
                alert("Please enter your email");
                return;
            }

            if (!email.includes(".") || !email.includes("@")) {
                alert("Enter correctly");
                return;
            }

            if (mobile === "" || mobile.length !== 10) {
                alert("Please enter your mobile number correctly");
                return;
            }

            if (gender === "") {
                alert("Please select your gender");
                return;
            }

            if (color === "") {
                alert("Please enter your favorite color");
                return;
            }

            var information = 
                "Name: " + name + "\n" +
                "Email: " + email + "\n" +
                "Mobile No: " + mobile + "\n" +
                "Gender: " + gender + "\n" +
                "Favorite Color: " + color;

            alert(information);
        }
    </script>

</body>
</html>
