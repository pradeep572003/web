<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Registration Page</title>
    <style>
        /* Base page theme styles */
        body {
            background-color: purple;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 0;
            padding: 20px;
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
        }

        /* Form display properties */
        form {
            display: block;
            margin: 0 auto;
            max-width: 400px;
            text-align: left;
        }

        label {
            display: inline-block;
            width: 100px;
            font-weight: bold;
            margin-bottom: 15px;
        }

        input {
            padding: 6px;
            font-size: 1rem;
            width: 250px;
            box-sizing: border-box;
            margin-bottom: 15px;
        }

        /* Button centering alignment */
        .btn-container {
            text-align: center;
            margin-top: 15px;
        }

        button {
            padding: 6px 15px;
            font-size: 1rem;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h1>Registration Page</h1>

    <div>
        <form name="registrationForm">
            <label for="userId">User ID:</label>
            <input type="text" id="userId" name="userId"><br>

            <label for="name">Name:</label>
            <input type="text" id="name" name="name"><br>

            <label for="password">Password:</label>
            <input type="text" id="password" name="password"><br>

            <label for="email">Email:</label>
            <input type="text" id="email" name="email"><br>

            <div class="btn-container">
                <button type="button" onclick="validateForm()">Submit</button>
            </div>
        </form>
    </div>

    <script>
        function validateForm() {
            // Get form element values
            var userId = document.getElementById("userId").value.trim();
            var name = document.getElementById("name").value.trim();
            var password = document.getElementById("password").value;
            var email = document.getElementById("email").value.trim();

            if (userId.length < 5 || userId.length > 12) {
                alert("User ID must be between 5 and 12 characters long");
                return;
            }

            var nameRegex = /^[A-Za-z\s]+$/;
            if (name.length < 10 || !nameRegex.test(name)) {
                alert("Name must be at least 15 characters long and contain only alphabets");
                return;
            }

            var passwordRegex = /^(?=.*[A-Z])(?=.*\d)(?=.*[!@#$%^&*()_\-+={}\[\]|\\:;"'<>,.?\/]).{8,}$/;
            if (!passwordRegex.test(password)) {
                alert("Password must be eight characters including one uppercase letter, one special character, and alphanumeric characters");
                return;
            }

            var emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                alert("Invalid email address");
                return;
            }

            var details = 
                "User ID: " + userId + "\n" +
                "Name: " + name + "\n" +
                "Password: " + password + "\n" +
                "Email: " + email;
                
            alert(details);
        }
    </script>
</body>
</html>
